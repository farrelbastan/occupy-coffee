    <style>
        /* CSS Tambahan Khusus untuk Perbaikan UI Navigasi */
        .nav-container {
            position: fixed;
            bottom: 60px; /* Posisi di bawah agar estetik */
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .nav-glass-box {
            display: flex;
            gap: 5px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }

        .nav-glass-box a {
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 15px;
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-glass-box a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffb3b3;
            transform: translateY(-2px);
        }

        /* Penyesuaian Maps */
        .location-section {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .map-frame {
            padding: 5px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .map-frame iframe {
            border-radius: 10px;
            filter: grayscale(100%) invert(90%);
            transition: 0.5s;
        }

        .map-frame:hover iframe {
            filter: grayscale(0%) invert(0%);
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .nav-glass-box {
                width: 90%;
                overflow-x: auto;
                justify-content: flex-start;
                padding: 5px 10px;
            }
            .nav-glass-box a {
                font-size: 10px;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body class="home-bg">

                    width="300" height="120" style="border:0;" allowfullscreen="" loading="lazy">

    <div class="footer-home">
        Jl. Sei Serayu No. 94, Babura Sunggal, Medan | Buka Setiap Hari: 13:00 - 23:59

    <script>
        // Fungsi Navigasi dengan Efek Transisi
        function goTo(page) {
            const navbar = document.querySelector('.nav-glass-box');
            
            // Efek feedback saat diklik
            if (page.includes('index.html')) {
                window.location.href = 'index.html?moved=true';
                return;
            }

            document.body.style.opacity = '0.5';
            document.body.style.transition = '0.5s';

            setTimeout(() => {
                window.location.href = page;
            }, 500);
        }

        // Cek parameter URL untuk animasi navbar
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('moved')) {
                // Tambahkan logika animasi jika diperlukan
            }
        };
    </script>
</body>
