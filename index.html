<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Title yang menarik untuk Google -->
    <title>HOME | OCCUPY COFFEE & SPACE MEDAN</title>

    <!-- Meta Tags untuk SEO -->
    <meta name="description" content="Occupy Coffee & Space, tempat nongkrong estetik dan ruang kreatif terbaik di Medan. Nikmati kopi berkualitas dari Signature Latte hingga Manual Brew.">
    <meta name="keywords" content="cafe di medan, tempat nongkrong medan, kopi medan, occupy coffee & space, ruang kreatif medan, coffee shop medan, cafe estetik medan">
    <meta name="author" content="Occupy Coffee & Space">
    <meta name="robots" content="index, follow">

    <!-- Favicon (Logo di Tab Browser) -->
    <link rel="icon" type="image/jpg" href="logoaplikasi.png.jpg">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* Penyesuaian agar teks tambahan tetap estetik */
        .home-summary {
            margin: 20px auto;
            max-width: 700px;
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* Container khusus untuk Maps agar rapi di bawah */
        .location-section {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            animation: fadeInUp 1.2s ease-out;
        }

        .map-frame {
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .map-frame:hover {
            transform: scale(1.02);
        }

        .map-frame iframe {
            border-radius: 15px;
            /* Membuat maps terlihat elegan dengan filter grayscale */
            filter: grayscale(100%) invert(90%) contrast(90%);
            transition: 0.5s;
        }

        .map-frame:hover iframe {
            filter: grayscale(0%) invert(0%);
        }

        .copyright {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.5;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="home-bg">

    <img src="logoaplikasi.png.jpg" alt="Logo Occupy" class="logo">

    <div class="main-content" id="hero-content">
        <h1 class="home-title">OCCUPY</h1>
        <p class="subtitle">COFFEE & SPACE</p>
        
        <div class="social-icons">
            <a href="https://www.instagram.com/occupy_coffee?igsh=a2huemJ2NjZpb3Vu" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/share/1S7cgUZ14W/" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.tiktok.com/@occupy_coffee?_r=1&_t=ZS-961XD6HQbkS" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>

        <!-- Bagian Maps Lokasi -->
        <div class="location-section">
            <div class="map-frame">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3982.102570044579!2d98.65083317424694!3d3.5638515504620025!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30312fe2050f283d%3A0x67302f232474706d!2sJl.%20Sei%20Serayu%20No.94%2C%20Babura%20Sunggal%2C%20Kec.%20Medan%20Sunggal%2C%20Kota%20Medan%2C%20Sumatera%20Utara!5e0!3m2!1sid!2sid!4v1714972000000!5m2!1sid!2sid" 
                    width="350" height="150" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>
    </div>

    <nav class="nav-center" id="navbar">
        <a onclick="goTo('index.html')">Home</a>
        <a onclick="goTo('about.html')">About</a>
        <a onclick="goTo('bestsellers.html')">Best Seller</a>
        <a onclick="goTo('gallery.html')">Gallery</a>
        <a onclick="goTo('team.html')">Our Team</a>
    </nav>

    <div class="footer-home">
        Jl. Sei Serayu No. 94, Babura Sunggal, Medan | Buka Setiap Hari: 13:00 - 23:59
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('moved')) {
                document.getElementById('navbar').style.transition = 'none';
                document.body.classList.add('nav-is-up');
                
                setTimeout(() => {
                    document.getElementById('navbar').style.transition = 'all 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
                }, 50);
            }
        };

        function goTo(page) {
            if (page === 'index.html') {
                window.location.href = 'index.html?moved=true';
                return;
            }

            document.body.classList.add('nav-is-up');

            setTimeout(() => {
                window.location.href = page;
            }, 800);
        }
    </script>
</body>
</html>
