    <link rel="stylesheet" href="style.css">
    <style>
        /* Style khusus galeri untuk tampilan yang lebih artistik */
        .gallery-container {
            column-count: 3;
            column-gap: 20px;
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
        }

        .gallery-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: 0.5s;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            border-color: white;
        }

        @media (max-width: 900px) {
            .gallery-container { column-count: 2; }
        }
        @media (max-width: 600px) {
            .gallery-container { column-count: 1; }
        }
    </style>
    <link rel="icon" type="image/jpg" href="logoaplikasi.png.jpg">
</head>
